<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <title>Ingatlan Scorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 340px;
      background: #f5f7fa;
      color: #222;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 14px;
      background: white;
      border-bottom: 1px solid #e0e0e0;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .controls label {
      font-weight: 600;
      white-space: nowrap;
    }
    #configSelect {
      flex: 1;
      min-width: 0;
      padding: 5px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: white;
    }
    #scoreBtn {
      padding: 8px 14px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    #scoreBtn:hover { background: #1558b0; }
    #scoreBtn:disabled { background: #9e9e9e; cursor: default; }

    #status {
      padding: 8px 14px;
      font-size: 12px;
      color: #555;
      min-height: 28px;
    }

    #result {
      display: none;
      padding: 10px 14px 14px;
    }

    .total-box {
      background: #1a73e8;
      color: white;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-box .label { font-size: 12px; opacity: 0.85; }
    .total-box .value { font-size: 22px; font-weight: 700; }

    .meta {
      background: white;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #555;
      border: 1px solid #e0e0e0;
      word-break: break-word;
    }
    .meta strong { color: #222; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e0e0e0;
    }
    thead tr { background: #e8f0fe; }
    thead th {
      padding: 6px 8px;
      text-align: left;
      font-weight: 700;
      font-size: 11px;
      color: #1a73e8;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    thead th:last-child { text-align: right; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody td {
      padding: 5px 8px;
      font-size: 12px;
      vertical-align: top;
    }
    tbody td:first-child { font-weight: 600; width: 90px; }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; color: #444; }
    tbody td.sub { text-align: right; font-weight: 700; color: #1a73e8; }
    .detail { font-size: 11px; color: #777; font-weight: 400; }

    #error {
      display: none;
      padding: 10px 14px;
      color: #c62828;
      background: #ffebee;
      border-top: 1px solid #ffcdd2;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>📊 Ingatlan Scorer</header>

  <div class="controls">
    <div class="controls-row" style="margin-bottom: 4px;">
      <button id="saveAllBtn" style="padding:4px 8px; background:#fff; border:1px solid #ccc; border-radius:4px; cursor:pointer;" title="Minden megnyitott ingatlan.com hirdetés mentése MHTML-be">💾</button>
      <span style="font-size: 12px; color: #555; font-weight: 600;">save all open ingatlan</span>
    </div>
    <div class="controls-row" style="margin-bottom: 4px;">
      <button id="saveFromPageBtn" style="padding:4px 8px; background:#fff; border:1px solid #ccc; border-radius:4px; cursor:pointer;" title="Az oldalon található összes ingatlan link megkeresése és mentése MHTML-be">🔗</button>
      <span style="font-size: 12px; color: #555; font-weight: 600;">save links from page</span>
    </div>
    <div class="controls-row">
      <label for="configSelect">Config:</label>
      <select id="configSelect"></select>
    </div>
    <button id="scoreBtn">Pontozás</button>
  </div>

  <div id="status">Nyomj a Pontozás gombra!</div>

  <div id="result">
    <div class="total-box">
      <div>
        <div class="label">Összpont</div>
        <div class="value" id="totalValue">—</div>
      </div>
      <div style="text-align:right">
        <div class="label" id="configLabel"></div>
        <div class="label" id="arValue" style="font-size:13px;font-weight:700;margin-top:4px;opacity:1;"></div>
      </div>
    </div>

    <div class="meta" id="metaBox"></div>

    <table>
      <thead>
        <tr>
          <th>Kategória</th>
          <th>Pont</th>
          <th>Súly</th>
          <th>Részpont</th>
        </tr>
      </thead>
      <tbody id="breakdown"></tbody>
    </table>
  </div>

  <div id="error"></div>

  <script src="scoring.js"></script>
  <script src="popup.js"></script>
</body>
</html>
